server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
jwt:
  secret: ${jwt-secret}

security:
  public-paths:
    - /api/v1/auth/register
    - /api/v1/auth/login